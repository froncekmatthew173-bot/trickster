name: Desktop Builds

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: windows
          - os: ubuntu-latest
            target: linux
          - os: macos-latest
            target: mac

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.2.5

      - name: Install macOS dependencies
        if: matrix.target == 'mac'
        run: brew install vlc

      - name: Install Linux dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libvlc-dev libvlccore-dev

      - name: Install Haxelibs
        shell: bash
        run: |
          haxelib install lime 7.9.0
          haxelib install openfl 9.0.2
          haxelib install hxcpp
          haxelib install flixel 4.11.0
          haxelib install flixel-addons 2.8.0
          haxelib install flixel-ui 2.3.3
          haxelib install hscript 2.4.0
          haxelib install actuate
          haxelib install newgrounds 1.1.5
          haxelib install polymod 1.5.2
          haxelib git extension-webm https://github.com/KadeDev/extension-webm

      - name: Rebuild extension-webm
        run: haxelib run lime rebuild extension-webm ${{ matrix.target }}

      - name: Build
        run: haxelib run lime build ${{ matrix.target }} -release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: trickster-${{ matrix.target }}
          path: export/release/**/bin
